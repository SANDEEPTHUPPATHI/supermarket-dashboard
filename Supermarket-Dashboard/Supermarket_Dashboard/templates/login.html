<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Supermarket OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--bg-body);
        }
        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: 32px;
            text-align: center;
        }
        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 24px;
        }
    </style>
</head>
<body>

    <div class="card auth-card">
        <div class="auth-logo">
            <i data-lucide="store" class="w-8 h-8 text-primary"></i>
            Supermarket OS
        </div>
        
        <h2 class="text-xl font-bold mb-6 text-main">Welcome Back</h2>

        {% if error %}
        <div style="background: rgba(239, 68, 68, 0.1); color: #ef4444; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: 500; font-size: 0.9rem;">
            {{ error }}
        </div>
        {% endif %}

        <form action="/" method="POST" class="text-left">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-input" required placeholder="admin">
            </div>
            <div class="form-group mb-6">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" required placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn btn-primary w-full">Sign In</button>
        </form>

        <p class="mt-6 text-sm text-muted">
            Don't have an account? <a href="/register" class="text-primary font-medium hover:underline">Create one</a>
        </p>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
